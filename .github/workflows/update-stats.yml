name: Update GitHub Profile Stats

on:
  schedule:
    # JST 毎週月曜朝 9:00 (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # プライベートリポジトリへのプッシュやコミットをする場合、チェックアウト時にトークンを指定する必要がある場合があります。
          # ただし、同じリポジトリであればデフォルトのGITHUB_TOKENで書き込み権限(contents: write)があればプッシュできます。
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate Stats SVG
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          uv run generate_stats.py

      - name: Commit and Push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          if git diff --cached --quiet; then
            echo "No changes in GitHub stats. Skipping commit."
          else
            git commit -m "Update GitHub profile stats [skip ci]"
            git push
          fi
